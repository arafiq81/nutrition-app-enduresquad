services:
  - type: web
    name: enduresquad-nutrition
    runtime: python3
    # init_db.py uses db.create_all() — idempotent, never drops existing data.
    # It runs on every deploy so new tables are always created automatically.
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn run:app -c gunicorn_config.py
    envVars:
      - key: FLASK_ENV
        value: production
      # DATABASE_URL is set manually in Render dashboard pointing to the
      # existing PostgreSQL instance — do NOT manage it here to avoid
      # Render creating a second empty database and overwriting the value.
