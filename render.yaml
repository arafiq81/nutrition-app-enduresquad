services:
  - type: web
    name: enduresquad-nutrition
    runtime: python3
    # DATABASE_URL is only available at runtime, not during build.
    # init_db.py runs before gunicorn so tables exist before the first request.
    # db.create_all() is idempotent — safe to run on every start, never drops data.
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn run:app -c gunicorn_config.py
    envVars:
      - key: FLASK_ENV
        value: production
      # DATABASE_URL is set manually in Render dashboard pointing to the
      # existing PostgreSQL instance — do NOT manage it here to avoid
      # Render creating a second empty database and overwriting the value.
